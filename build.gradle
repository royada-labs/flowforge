plugins {
    id 'base'
}

allprojects {
    group = project.group
    version = project.version

    repositories {
        mavenCentral()
    }
}

subprojects {

    // EXCLUSIÓN TOTAL: este módulo es tooling interno, no librería publicable
    if (project.name == "flowforge-stress-harness") {
        // No aplicar java-library ni maven-publish aquí.
        // (El módulo se configura a sí mismo con Spring Boot)
        return
    }

    apply plugin: 'java-library'
    apply plugin: 'maven-publish'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(
                    project.findProperty('javaVersion') as int
            )
        }
    }

    tasks.withType(Test).configureEach {
        useJUnitPlatform()
    }

    publishing {
        publications {
            mavenJava(MavenPublication) {
                from components.java

                groupId = 'io.tugrandsolutions.flowforge'
                artifactId = project.name
                version = project.version
            }
        }

        repositories {
            maven {
                name = "nexus"

                url = version.endsWith('SNAPSHOT')
                        ? uri("https://nexus.royadahome.com/repository/maven-snapshots/")
                        : uri("https://nexus.royadahome.com/repository/maven-releases/")

                credentials {
                    username = findProperty("nexusUser") ?: System.getenv("NEXUS_USER")
                    password = findProperty("nexusPassword") ?: System.getenv("NEXUS_PASSWORD")
                }
            }
        }

    }
}
