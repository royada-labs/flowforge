name: Publish to Maven Central

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission
        run: chmod +x ./gradlew

      # 🔹 Build + generate ZIP bundles for each module (already handles publishToMavenLocal and signing)
      - name: Generate Central Bundles
        run: ./gradlew clean generateCentralBundle --no-daemon
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}

      # 🔹 Consolidate all module bundles into a single ZIP with correct Maven structure
      - name: Consolidate and Create Meta-Bundle
        run: |
          mkdir -p temp_bundle
          # Find all zip bundles generated by the Gradle task and extract them into temp_bundle
          find . -name "*-bundle.zip" -exec unzip -o {} -d temp_bundle/ \;
          # Zip the unified structure (all modules merged)
          cd temp_bundle
          zip -r ../bundle.zip .
          cd ..

      # 🔹 Upload the meta-bundle to Maven Central (Sonatype Central Portal API)
      - name: Upload bundle to Maven Central
        run: |
          curl -X POST "https://central.sonatype.com/api/v1/publisher/upload" \
            -H "Authorization: Bearer $MAVEN_CENTRAL_TOKEN" \
            -F "bundle=@bundle.zip"
        env:
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
