name: Publish to Maven Central

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 🔹 Build + publish to local repo
      - name: Build artifacts
        run: |
          chmod +x ./gradlew
          ./gradlew clean publishToMavenLocal --no-daemon
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      # 🔹 Generate checksums (REQUIRED)
      - name: Generate checksums
        run: |
          cd ~/.m2/repository
          find io/github/rrguez/flowforge -type f \( -name "*.jar" -o -name "*.pom" \) | while read f; do
            md5sum "$f" > "$f.md5"
            sha1sum "$f" > "$f.sha1"
          done

      # 🔹 Create bundle (CRITICAL: relative paths)
      - name: Create bundle
        run: |
          cd ~/.m2/repository
          zip -r bundle.zip io/github/rrguez/flowforge

      # 🔹 Upload to Central Portal
      - name: Upload to Maven Central
        run: |
          curl -X POST "https://central.sonatype.com/api/v1/publisher/upload" \
            -H "Authorization: Bearer $MAVEN_CENTRAL_TOKEN" \
            -F "bundle=@bundle.zip"
        env:
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
